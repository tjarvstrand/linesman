name: Test

on:
  push:
    branches:
      -main
      - ci-*
    tags: ['v[0-9]*']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run check
      - run: bin/run-tests
      - run: mise run format # Ensure generated files don't break pana analysis
      - run: dart pub global activate pana
      - run: dart pub global run pana --exit-code-threshold 0

verbose: true
groups:
  nested:
    - package:linesman_example/more_imports/*
    - package:linesman_example/**/*.dart
rules:
  - type: deny
    source: test.dart
    target: import1.dart
    message: Use import3.dart instead
  - type: deny
    source: test.dart
    target: '*2.dart'
  - type: deny
    source: test.dart
    target: package:linesman_example/import3.dart
  - type: deny
    source: '**'
    target: package:linesman_example/import4.dart
  - type: deny
    source: '*.dart'
    target: $nested

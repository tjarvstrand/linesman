[tools]
dart = "3.11.2"

[tasks.deps]
run = "dart pub get && touch .dart_tool/package_config.json"
sources = ["pubspec.yaml"]
outputs = [".dart_tool/package_config.json"]

[tasks.test]
description = "Run tests"
depends = ["deps"]
run = "dart test"

[tasks.format-check]
description = "Check formatting"
depends = ["deps"]
run = "dart format --output=none --set-exit-if-changed ."

[tasks.analyze]
description = "Run static analysis"
depends = ["deps"]
run = "dart analyze --fatal-infos"

[tasks.format]
description = "Check formatting"
run = "dart format ."

[tasks.check]
description = "Analyze and check formatting"
depends = ["analyze", "format-check"]

[tasks.release]
description = "Release: update changelog, publish to pub.dev, push tag"
depends = ["check"]
run = "bin/release"
